<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{ .Title }} — Downtown Loyal Heights</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @font-face {
      font-family: 'Germania One';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/fonts/germania-one.woff2') format('woff2');
    }

    :root {
      --pink:      oklch(64% 0.22 8);
      --pink-deep: oklch(50% 0.20 14);
      --cream:     oklch(95% 0.014 80);
      --cream-2:   oklch(91% 0.018 80);
      --ink:       oklch(20% 0.014 30);
      --rule:      oklch(20% 0.014 30 / .13);

      --f-logo:  'Germania One', Georgia, serif;
      --f-serif: Georgia, Cambria, 'Times New Roman', serif;
      --f-sans:  system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --f-mono:  ui-monospace, 'SF Mono', Menlo, Monaco, 'Cascadia Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: var(--f-sans);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      padding: 28px 40px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--rule);
    }
    .wordmark {
      font-family: var(--f-logo);
      font-weight: 400;
      font-size: 22px;
      letter-spacing: .01em;
      line-height: 1;
      color: var(--pink-deep);
      text-decoration: none;
    }
    .header-tag {
      font-family: var(--f-mono);
      letter-spacing: .14em;
      text-transform: uppercase;
      font-size: 9px;
      color: var(--ink);
      opacity: .45;
    }

    /* ── Main content ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 64px 40px 96px;
    }

    /* Page title */
    h1 {
      font-family: var(--f-serif);
      font-weight: 700;
      font-size: clamp(1.9rem, 4.5vw, 2.7rem);
      letter-spacing: -.02em;
      line-height: 1.08;
      color: var(--ink);
      margin: 0 0 14px;
    }

    /* Subtitle (from front matter, rendered before .Content) */
    .subtitle {
      font-family: var(--f-serif);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--ink);
      opacity: .72;
      margin: 0 0 44px;
      line-height: 1.5;
    }

    /* Section headers */
    h2 {
      font-family: var(--f-mono);
      font-weight: 500;
      font-size: 9.5px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .5;
      margin: 44px 0 14px;
    }

    /* Sub-section headers */
    h3 {
      font-family: var(--f-serif);
      font-weight: 700;
      font-size: 1rem;
      color: var(--ink);
      margin: 28px 0 8px;
      line-height: 1.3;
    }

    /* Body */
    p {
      font-size: .9375rem;
      line-height: 1.68;
      margin: 0 0 18px;
    }

    a {
      color: var(--pink-deep);
      text-underline-offset: 2px;
    }
    a:hover { color: var(--pink); }

    ul {
      font-size: .9375rem;
      line-height: 1.68;
      padding-left: 1.4rem;
      margin: 0 0 18px;
    }
    li { margin-bottom: 8px; }

    hr {
      border: none;
      height: 1px;
      background: var(--rule);
      margin: 44px 0;
    }

    /* Contact box */
    .contact {
      background: var(--cream-2);
      border: 1px solid var(--rule);
      padding: 18px 24px;
      margin: 4px 0 0;
    }
    .contact p { margin: 0; }
    .contact strong { font-family: var(--f-serif); font-weight: 700; }

    /* Legal disclaimer */
    .disclaimer {
      font-size: .75rem;
      opacity: .5;
      font-style: italic;
      line-height: 1.6;
      border-top: 1px solid var(--rule);
      padding-top: 28px;
      margin-top: 52px;
    }

    /* ── Footer ── */
    footer {
      padding: 22px 40px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-mark {
      font-family: var(--f-logo);
      font-weight: 400;
      font-size: 16px;
      color: var(--pink-deep);
      opacity: .45;
    }
    .footer-tag {
      font-family: var(--f-mono);
      font-size: 8px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .35;
    }

    @media (max-width: 600px) {
      header { padding: 20px; }
      main   { padding: 40px 20px 72px; }
      footer { padding: 18px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="wordmark">Downtown Loyal Heights</a>
    <span class="header-tag">Seattle · WA</span>
  </header>

  <main>
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
    {{ .Content }}
  </main>

  <footer>
    <span class="footer-mark">DTLH</span>
    <span class="footer-tag">Downtown Loyal Heights · Seattle · WA</span>
  </footer>

</body>
</html>
