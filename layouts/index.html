<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{ .Site.Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="{{ .Site.Params.description }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ .Permalink }}" />
  <meta property="og:title" content="{{ .Site.Title }}" />
  <meta property="og:description" content="{{ .Site.Params.description }}" />
  <meta property="og:image" content="{{ "og-card.png" | absURL }}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ .Site.Title }}" />
  <meta name="twitter:description" content="{{ .Site.Params.description }}" />
  <meta name="twitter:image" content="{{ "og-card.png" | absURL }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "favicons/favicon-32.png" | absURL }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ "favicons/favicon-16.png" | absURL }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "favicons/apple-touch-icon.png" | absURL }}">
  <link rel="manifest" href="{{ "favicons/site.webmanifest" | absURL }}">
  <meta name="theme-color" content="#B53050">
  <style>
    @font-face {
      font-family: "Germania One";
      src: url("/fonts/germania-one-regular.woff2") format("woff2");
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: "Source Serif 4";
      src: url("/fonts/source-serif-4-variable-roman.woff2") format("woff2-variations"),
           url("/fonts/source-serif-4-variable-roman.woff2") format("woff2");
      font-weight: 200 900; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: "Source Serif 4";
      src: url("/fonts/source-serif-4-variable-italic.woff2") format("woff2-variations"),
           url("/fonts/source-serif-4-variable-italic.woff2") format("woff2");
      font-weight: 200 900; font-style: italic; font-display: swap;
    }

    :root {
      --pink-deep: #B53050;
      --cream:     #F1ECE2;
      --ink:       #252321;
      --muted:     #5C4F46;
      --rule:      rgba(42,33,27,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Masthead ── */
    .masthead {
      padding: 56px 32px 20px;
      text-align: center;
    }
    .wordmark {
      font-family: "Germania One", serif;
      color: var(--pink-deep);
      font-size: clamp(40px, 6vw, 64px);
      line-height: 0.92;
      letter-spacing: 0.005em;
      text-decoration: none;
      display: inline-block;
    }
    .tagline {
      font-family: "Source Serif 4", Georgia, serif;
      font-style: italic; font-weight: 400;
      font-size: clamp(15px, 1.8vw, 18px);
      color: var(--muted);
      margin: 14px 0 0;
    }
    .masthead-divider {
      border: 0; border-top: 1px solid var(--rule);
      margin: 0 32px;
    }

    /* ── Article ── */
    article { max-width: 720px; margin: 0 auto; padding: 56px 32px 80px; }

    .eyebrow-label {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
      font-weight: 500;
      color: var(--muted);
      margin: 0 0 18px;
    }
    .deck-rule {
      display: block;
      border: 0;
      width: 48px;
      height: 2px;
      background-color: var(--pink-deep);
      margin: 0 0 18px;
    }
    .eyebrow-label--section { margin: 44px 0 12px; }

    article h1 {
      font-family: "Source Serif 4", Georgia, serif;
      font-weight: 600;
      font-size: 28px;
      line-height: 1.4;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink);
      max-width: 560px;
      margin: 0;
    }
    article h2 {
      font-family: "Source Serif 4", Georgia, serif;
      font-weight: 600;
      font-size: clamp(28px, 3.6vw, 36px);
      line-height: 1.15; letter-spacing: -.005em;
      color: var(--ink);
      margin: 44px 0 0;
    }
    article h3 {
      font-family: "Source Serif 4", Georgia, serif;
      font-weight: 600;
      font-size: 22px; line-height: 1.25;
      color: var(--ink);
      margin: 28px 0 0;
    }
    article h3 em {
      font-style: italic; font-weight: 400; color: var(--muted);
    }
    article p, article li {
      font-size: 17px; line-height: 1.65;
      color: var(--ink);
      margin: 16px 0 0;
    }
    article ul { padding-left: 1.4rem; margin: 16px 0 0; }
    article li { margin-bottom: 6px; }
    article a {
      color: var(--pink-deep);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    article hr {
      border: 0; border-top: 1px solid var(--rule);
      margin: 44px 0;
    }

    /* Contact box */
    .contact {
      background: rgba(42,33,27,0.05);
      border: 1px solid var(--rule);
      padding: 18px 24px;
      margin-top: 16px;
    }
    .contact p { margin: 0; }
    .contact strong { font-weight: 600; }

    /* Legal disclaimer */
    .disclaimer {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      line-height: 1.6;
      border-top: 1px solid var(--rule);
      padding-top: 28px;
      margin-top: 52px !important;
    }

    /* ── Milestone banner ── */
    .milestone-banner {
      background: var(--pink-deep);
      color: var(--cream);
      text-align: center;
      padding: 20px 32px;
    }
    .milestone-numbers {
      font-family: "Germania One", serif;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1;
      letter-spacing: 0.02em;
      margin: 0;
    }
    .milestone-numbers span {
      opacity: 0.6;
      font-size: 0.55em;
      vertical-align: middle;
      margin: 0 0.4em;
    }
    .milestone-tagline {
      font-family: "Source Serif 4", Georgia, serif;
      font-style: italic;
      font-size: clamp(14px, 1.6vw, 17px);
      opacity: 0.85;
      margin: 8px 0 0;
    }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--ink);
      padding: 20px 32px;
      display: flex; justify-content: space-between;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 9px; letter-spacing: .22em; text-transform: uppercase;
      color: var(--ink); opacity: .55;
    }
  </style>
</head>
<body>

  <header class="masthead">
    <a href="/" class="wordmark" aria-label="Downtown Loyal Heights — home">
      <span>Downtown</span><br>
      <span>Loyal Heights</span>
    </a>
    <p class="tagline">Loyal Heights should own Loyal Heights.</p>
  </header>
  <hr class="masthead-divider">

  {{ with .Params.milestone_pledged }}
  <div class="milestone-banner">
    <p class="milestone-numbers">{{ $.Params.milestone_neighbors }} neighbors <span>·</span> {{ . }} pledged</p>
    <p class="milestone-tagline">{{ $.Params.milestone_tagline }}</p>
  </div>
  {{ end }}

  <article>
    <p class="eyebrow-label">May 2026</p>
    <hr class="deck-rule">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </article>

  <footer class="site-footer">
    <span>Downtown · Loyal · Heights</span>
    <span>Seattle · WA</span>
  </footer>

</body>
</html>
